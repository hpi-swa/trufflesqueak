name: Test TruffleSqueak

on:
  push:
    branches-ignore:
      - 'experiements/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - gu-catalog.properties
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - gu-catalog.properties
  workflow_dispatch:

env:
  # JVMCI_VERSION_CHECK: 'warn' # version of EA build does not always match
  GRAALVM_VERSION: '25e1-ea'
  JAVA_VERSION: '25.0.2'
  NATIVE_IMAGE_OPTIONS: '-J-XX:MaxRAMPercentage=100'
  PGO_FILE_CUIS: '${{ github.workspace }}/trufflesqueak-cuis.iprof'
  PGO_FILE_SQUEAK: '${{ github.workspace }}/trufflesqueak-squeak.iprof'
  PGO_LCOV_FILE_CUIS: '${{ github.workspace }}/lcov-cuis.info'
  PGO_LCOV_FILE_SQUEAK: '${{ github.workspace }}/lcov-squeak.info'
  PYTHONIOENCODING: 'utf-8'
  PYTHON_VERSION: '3.12'
  VERBOSE_GRAALVM_LAUNCHERS: true

jobs:
  gate:
    name: gate
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    steps:
    - &checkout_repo
      name: Clone TruffleSqueak repository
      uses: &checkout_action actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - &setup_python
      name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: '${{ env.PYTHON_VERSION }}'
    - name: Set up dependencies
      run: |
        # Download Eclipse SDK
        eclipse_tar_path="${RUNNER_TEMP}/eclipse.tar.gz"
        wget --no-verbose https://archive.eclipse.org/eclipse/downloads/drops4/R-4.36-202505281830/eclipse-SDK-4.36-linux-gtk-x86_64.tar.gz -O ${eclipse_tar_path}
        tar -xzf ${eclipse_tar_path} -C ${RUNNER_TEMP}
        echo "ECLIPSE_EXE=${RUNNER_TEMP}/eclipse/eclipse" >> "${GITHUB_ENV}" # required by mx
        # Set up mx, oracle/graal, and LabsJDK
        mx.trufflesqueak/utils.sh "set-up-mx && shallow-clone-graal && set-up-labsjdk latest"
        # Set up style dependencies
        sudo apt update && sudo apt install python3-pip python-setuptools
        jq -r '.pip | to_entries[] | .key+.value' ../graal/common.json | xargs sudo pip install
    - name: Run gate
      run: mx --java-home="${JAVA_HOME}" gate --strict-mode --omit-clean --tags style,fullbuild,test

  build-jvm-standalone:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, windows-2022, macos-14]
        type: [jvm]
    outputs:
      # Squeak timings
      squeak_ubuntu_22_04: ${{ steps.timer_squeak.outputs.squeak_ubuntu_22_04 }}
      squeak_ubuntu_22_04_arm: ${{ steps.timer_squeak.outputs.squeak_ubuntu_22_04_arm }}
      squeak_macos_14: ${{ steps.timer_squeak.outputs.squeak_macos_14 }}
      squeak_windows_2022: ${{ steps.timer_squeak_windows.outputs.squeak_windows_2022 }}

      # Cuis 7.3 timings
      cuis73_ubuntu_22_04: ${{ steps.timer_cuis73.outputs.cuis73_ubuntu_22_04 }}
      cuis73_ubuntu_22_04_arm: ${{ steps.timer_cuis73.outputs.cuis73_ubuntu_22_04_arm }}
      cuis73_macos_14: ${{ steps.timer_cuis73.outputs.cuis73_macos_14 }}
      # NOTE: If a dedicated Windows step is added for Cuis 7.3, update the step ID below
      cuis73_windows_2022: ${{ steps.timer_cuis73.outputs.cuis73_windows_2022 }}

      # Cuis 7.5 timings
      cuis75_ubuntu_22_04: ${{ steps.timer_cuis75.outputs.cuis75_ubuntu_22_04 }}
      cuis75_ubuntu_22_04_arm: ${{ steps.timer_cuis75.outputs.cuis75_ubuntu_22_04_arm }}
      cuis75_macos_14: ${{ steps.timer_cuis75.outputs.cuis75_macos_14 }}
      # NOTE: If a dedicated Windows step is added for Cuis 7.5, update the step ID below
      cuis75_windows_2022: ${{ steps.timer_cuis75.outputs.cuis75_windows_2022 }}
    env:
      VM_ARGS: "--vm.ea --vm.Xmx6G --experimental-options --smalltalk.resource-summary=true --watchdog-timeout=25 --sdl-poll-timeout=16 --compiler.TreatPerformanceWarningsAsErrors=call,instanceof,store,trivial --compiler.DeoptCycleDetectionThreshold=-1 --engine.CompilationFailureAction=Diagnose --engine.CompilationStatistics"
    name: build ${{ matrix.type }} ${{ matrix.os }}
    timeout-minutes: 45
    runs-on: ${{ matrix.os }}
    steps:
    - &checkout_repo_submodules
      name: Clone TruffleSqueak repository
      uses: *checkout_action
      with:
        submodules: true
    - &setup_graalvm
      name: Set up Oracle GraalVM
      uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38  # v1.5.6
      with:
        java-version: '${{ env.GRAALVM_VERSION }}'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - &enable_bootstrap_graalvm
      name: Enable Oracle GraalVM
      shell: bash
      run: echo "BOOTSTRAP_GRAALVM=$JAVA_HOME" >> $GITHUB_ENV
    - *setup_python
    - &setup_dependencies
      name: Set up dependencies
      shell: bash
      run: mx.trufflesqueak/utils.sh set-up-dependencies ${{ matrix.type }}
    - name: Build TruffleSqueak JVM standalone
      run: |
        mx.trufflesqueak/utils.sh build-standalone ${{ matrix.type }}
      if: ${{ runner.os != 'Windows' }}
    - name: Build TruffleSqueak standalone via cmd.exe
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        call mx --env ${{ matrix.type }} --no-download-progress build
        if ${{ matrix.type }}==native (set "STANDALONE_NAME=TRUFFLESQUEAK_NATIVE_STANDALONE") else (set "STANDALONE_NAME=TRUFFLESQUEAK_JVM_STANDALONE") 
        call mx --env ${{ matrix.type }} paths --output %STANDALONE_NAME% > standalone-home-with-forward-slashes.txt
        set /p STANDALONE_HOME=<standalone-home-with-forward-slashes.txt
        echo STANDALONE_HOME=%STANDALONE_HOME%>>%GITHUB_ENV%
        echo %STANDALONE_HOME%/bin>>%GITHUB_PATH%
        echo [%STANDALONE_HOME%/bin added to $PATH]
      if: ${{ runner.os == 'Windows' }}
    - &archive_standalone
      name: Archive TruffleSqueak standalone
      shell: bash
      run: mx.trufflesqueak/utils.sh archive-standalone ${{ matrix.type }}
    - &run_system_reporter
      name: Run SystemReporter on TruffleSqueak standalone
      shell: bash
      run: |
        trufflesqueak --download-image trufflesqueak --code "(String streamContents: [:s | SystemReporter basicNew reportImage: s; reportVM: s; reportVMParameters: s]) withUnixLineEndings"
    - &deploy_standalone
      name: Deploy TruffleSqueak standalone
      shell: bash
      run: mx.trufflesqueak/utils.sh deploy-asset ${{ env.STANDALONE_ARCHIVE }} ${{ secrets.GITHUB_TOKEN }}
    - &upload_standalone
      name: Upload TruffleSqueak standalone
      uses: &upload_artifact_action actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: trufflesqueak-${{ matrix.type }}-${{ matrix.os }}
        path: ${{ env.STANDALONE_ARCHIVE }}
        retention-days: 7
      if: ${{ matrix.os == 'ubuntu-22.04-arm' && matrix.type == 'native' }} # for run-benchmarks
    - &run_polyglot_smoketest
      name: Run trufflesqueak-polyglot-get on TruffleSqueak JVM standalone
      run: |
        trufflesqueak-polyglot-get -v ${{ env.GRAALVM_VERSION }} -a js
        trufflesqueak --code "Polyglot eval: 'js' string: 'new Object({hello_world: 42})'"
      if: ${{ matrix.type == 'jvm' && ! endsWith(env.GRAALVM_VERSION, '-ea') }}
    - &start_xvfb
      name: Start Xvfb in background
      run: |
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        echo "DISPLAY=:99" >> $GITHUB_ENV
      if: ${{ runner.os == 'Linux' }}
    - &run_cuis73_tests
      name: Run Cuis 7.3 tests on TruffleSqueak standalone
      id: timer_cuis73
      run: |
        START_TIME=$SECONDS
        trufflesqueak --download-image cuis-7.3-test ${{ env.VM_ARGS }} -- -s src/image-tests/runCuisTests.st
        ELAPSED_TIME=$(($SECONDS - $START_TIME))
        FORMATTED_TIME=$(printf "%02d:%02d" $((ELAPSED_TIME / 60)) $((ELAPSED_TIME % 60)))
        SAFE_OS=$(echo "${{ matrix.os }}" | tr '-' '_' | tr '.' '_')
        echo "cuis73_${SAFE_OS}=${FORMATTED_TIME}" >> "$GITHUB_OUTPUT"
      timeout-minutes: 10
      if: ${{ matrix.os == 'macos-14' }}
    - &run_cuis75_tests
      name: Run Cuis 7.5 tests on TruffleSqueak standalone
      id: timer_cuis75
      run: |
        START_TIME=$SECONDS
        trufflesqueak --download-image cuis-7.5-test ${{ env.VM_ARGS }} -- -s src/image-tests/runCuisTests.st
        ELAPSED_TIME=$(($SECONDS - $START_TIME))
        FORMATTED_TIME=$(printf "%02d:%02d" $((ELAPSED_TIME / 60)) $((ELAPSED_TIME % 60)))
        SAFE_OS=$(echo "${{ matrix.os }}" | tr '-' '_' | tr '.' '_')
        echo "cuis75_${SAFE_OS}=${FORMATTED_TIME}" >> "$GITHUB_OUTPUT"
      timeout-minutes: 10
      if: ${{ matrix.os == 'ubuntu-22.04' }}
    - &run_squeak_tests_windows
      name: Run Squeak/Smalltalk tests on TruffleSqueak standalone on Windows
      id: timer_squeak_windows
      run: |
        $sw = [System.Diagnostics.Stopwatch]::StartNew()
        trufflesqueak --download-image trufflesqueak-test ${{ env.VM_ARGS }} -- ..\..\..\..\src\image-tests\runSqueakTests.st
        $sw.Stop()
        $formatted = "{0:D2}:{1:D2}" -f $sw.Elapsed.Minutes, $sw.Elapsed.Seconds
        $safeOs = "${{ matrix.os }}".Replace('-', '_').Replace('.', '_')
        Add-Content -Path $env:GITHUB_OUTPUT -Value "squeak_${safeOs}=${formatted}"
      timeout-minutes: 30
      if: ${{ matrix.os == 'windows-2022' }}
    - &run_squeak_tests_unix
      name: Run Squeak/Smalltalk tests on TruffleSqueak standalone
      id: timer_squeak
      shell: bash
      run: |
        START_TIME=$SECONDS
        trufflesqueak --download-image trufflesqueak-test ${{ env.VM_ARGS }} -- $(pwd)/src/image-tests/runSqueakTests.st
        ELAPSED_TIME=$(($SECONDS - $START_TIME))
        FORMATTED_TIME=$(printf "%02d:%02d" $((ELAPSED_TIME / 60)) $((ELAPSED_TIME % 60)))
        SAFE_OS=$(echo "${{ matrix.os }}" | tr '-' '_' | tr '.' '_')
        echo "squeak_${SAFE_OS}=${FORMATTED_TIME}" >> "$GITHUB_OUTPUT"
      timeout-minutes: 30
      if: ${{ matrix.os != 'windows-2022' }}
    - &upload_graal_dumps
      name: Upload Graal compiler dumps
      uses: *upload_artifact_action
      with:
        name: graal_dumps-${{ matrix.type }}-${{ matrix.os }}
        path: graal_dumps/
        if-no-files-found: ignore
        retention-days: 5
      if: always()

  build-instrumented:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        type: [native]
    name: instrument ${{ matrix.os }}
    timeout-minutes: 45
    runs-on: ubuntu-22.04
    steps:
    - *checkout_repo_submodules
    - *setup_graalvm
    - *enable_bootstrap_graalvm
    - *setup_python
    - *setup_dependencies
    - name: Build instrumented TruffleSqueak standalone
      run: |
        export NATIVE_IMAGE_OPTIONS="${NATIVE_IMAGE_OPTIONS} --pgo-instrument -H:+UnlockExperimentalVMOptions -H:+ProfilingLCOV -H:-UnlockExperimentalVMOptions"
        mx.trufflesqueak/utils.sh build-standalone ${{ matrix.type }}
    - *run_system_reporter
    - *start_xvfb
    - name: Run Cuis 7.3 tests on instrumented TruffleSqueak standalone
      run: |
        trufflesqueak --download-image cuis-7.3-test --engine.Mode=default --vm.XX:ProfilesDumpFile=${{ env.PGO_FILE_CUIS }} --vm.XX:ProfilesLCOVFile=${{ env.PGO_LCOV_FILE_CUIS }} -- -s src/image-tests/runCuisTests.st
      timeout-minutes: 10
      if: ${{ matrix.os == 'ubuntu-22.04' }}
    - name: Run Squeak/Smalltalk tests on instrumented TruffleSqueak standalone
      shell: bash
      run: |
        trufflesqueak --download-image trufflesqueak-test --engine.Mode=default --vm.XX:ProfilesDumpFile=${{ env.PGO_FILE_SQUEAK }} --vm.XX:ProfilesLCOVFile=${{ env.PGO_LCOV_FILE_SQUEAK }} -- $(pwd)/src/image-tests/runSqueakTests.st
      timeout-minutes: 30
    - name: Report code coverage
      env:
        CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      run: bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r ${{ env.PGO_LCOV_FILE_CUIS }} -r ${{ env.PGO_LCOV_FILE_SQUEAK }}
      if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
    - name: Upload PGO profiles
      uses: *upload_artifact_action
      with:
        name: trufflesqueak-profiles
        path: trufflesqueak-*.iprof

  build-native-standalone:
    needs: build-instrumented
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, windows-2022, macos-14]
        type: [native]
    outputs:
      # Squeak timings
      squeak_ubuntu_22_04: ${{ steps.timer_squeak.outputs.squeak_ubuntu_22_04 }}
      squeak_ubuntu_22_04_arm: ${{ steps.timer_squeak.outputs.squeak_ubuntu_22_04_arm }}
      squeak_macos_14: ${{ steps.timer_squeak.outputs.squeak_macos_14 }}
      squeak_windows_2022: ${{ steps.timer_squeak_windows.outputs.squeak_windows_2022 }}

      # Cuis 7.3 timings
      cuis73_ubuntu_22_04: ${{ steps.timer_cuis73.outputs.cuis73_ubuntu_22_04 }}
      cuis73_ubuntu_22_04_arm: ${{ steps.timer_cuis73.outputs.cuis73_ubuntu_22_04_arm }}
      cuis73_macos_14: ${{ steps.timer_cuis73.outputs.cuis73_macos_14 }}
      # NOTE: If a dedicated Windows step is added for Cuis 7.3, update the step ID below
      cuis73_windows_2022: ${{ steps.timer_cuis73.outputs.cuis73_windows_2022 }}

      # Cuis 7.5 timings
      cuis75_ubuntu_22_04: ${{ steps.timer_cuis75.outputs.cuis75_ubuntu_22_04 }}
      cuis75_ubuntu_22_04_arm: ${{ steps.timer_cuis75.outputs.cuis75_ubuntu_22_04_arm }}
      cuis75_macos_14: ${{ steps.timer_cuis75.outputs.cuis75_macos_14 }}
      # NOTE: If a dedicated Windows step is added for Cuis 7.5, update the step ID below
      cuis75_windows_2022: ${{ steps.timer_cuis75.outputs.cuis75_windows_2022 }}
    env:
      VM_ARGS: "--vm.Xmx6G --headless --experimental-options --watchdog-timeout=25 --sdl-poll-timeout=16 --compiler.DeoptCycleDetectionThreshold=-1 --engine.CompilationFailureAction=Diagnose"
    name: build ${{ matrix.type }} ${{ matrix.os }}
    timeout-minutes: 45
    runs-on: ${{ matrix.os }}
    steps:
    - *checkout_repo_submodules
    - *setup_graalvm
    - *enable_bootstrap_graalvm
    - *setup_python
    - *setup_dependencies
    - name: Download PGO profiles
      uses: &download_artifact_action actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: trufflesqueak-profiles
      if: ${{ matrix.type == 'native' }}
    - name: Free resources on macOS
      run: |
        echo "Disabling Spotlight indexing..."
        sudo mdutil -a -i off
        sudo mdutil -a -d
        sudo launchctl bootout system /System/Library/LaunchDaemons/com.apple.metadata.mds.plist
        sudo pkill -f "mds|mds_stores|mdworker_shared|Spotlight|corespotlightd"

        echo "Forcing disk cache to be purged..."
        sudo purge

        echo "Top processes sorted by memory usage:"
        ps -emo pid,pmem,pcpu,comm | head 2>/dev/null
        echo ""
        memory_pressure
        echo ""
        echo "Setting '--parallelism=1' for native-image builds..."
        echo "NATIVE_IMAGE_OPTIONS=--parallelism=1 ${NATIVE_IMAGE_OPTIONS}" >> $GITHUB_ENV
      if: ${{ runner.os == 'macOS' }}
    - name: Build TruffleSqueak standalone
      run: |
        export NATIVE_IMAGE_OPTIONS="${NATIVE_IMAGE_OPTIONS} --pgo=${{ env.PGO_FILE_CUIS }},${{ env.PGO_FILE_SQUEAK }}"
        mx.trufflesqueak/utils.sh build-standalone ${{ matrix.type }}
      if: ${{ runner.os != 'Windows' }}
    - name: Build TruffleSqueak standalone via cmd.exe
      shell: cmd
      run: |
        set NATIVE_IMAGE_OPTIONS=%NATIVE_IMAGE_OPTIONS% --pgo=${{ env.PGO_FILE_CUIS }},${{ env.PGO_FILE_SQUEAK }}
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        call mx --env ${{ matrix.type }} --no-download-progress build
        if ${{ matrix.type }}==native (set "STANDALONE_NAME=TRUFFLESQUEAK_NATIVE_STANDALONE") else (set "STANDALONE_NAME=TRUFFLESQUEAK_JVM_STANDALONE") 
        call mx --env ${{ matrix.type }} paths --output %STANDALONE_NAME% > standalone-home-with-forward-slashes.txt
        set /p STANDALONE_HOME=<standalone-home-with-forward-slashes.txt
        echo STANDALONE_HOME=%STANDALONE_HOME%>>%GITHUB_ENV%
        echo %STANDALONE_HOME%/bin>>%GITHUB_PATH%
        echo [%STANDALONE_HOME%/bin added to $PATH]
      if: ${{ runner.os == 'Windows' }}
    - *archive_standalone
    - *run_system_reporter
    - *deploy_standalone
    - *upload_standalone
    - *run_polyglot_smoketest
    - *run_cuis73_tests
    - *run_cuis75_tests
    - *run_squeak_tests_windows
    - *run_squeak_tests_unix
    - *upload_graal_dumps

  run-benchmarks:
    needs: build-native-standalone
    strategy:
      fail-fast: false
      matrix:
        include:
          - kind: peak
            os: ubuntu-22.04-arm
            type: native
            iterations: 300
            vm-args: '--compiler.TreatPerformanceWarningsAsErrors=call,instanceof,store,trivial --engine.Mode=default --engine.TraceCompilation --engine.CompilationFailureAction=ExitVM --engine.DynamicCompilationThresholds=false --engine.CompilationStatistics'
          - kind: interpreter
            os: ubuntu-22.04-arm
            type: native
            iterations: 6
            vm-args: '--engine.Compilation=false'
    env:
      COMMON_VM_ARGS: "--headless --quiet --experimental-options --smalltalk.resource-summary=true"
      EXEC: "/usr/bin/time -v"
    name: benchmark ${{ matrix.kind }}
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    steps:
    - *checkout_repo # for analyze_benchmarks.py
    - name: Download TruffleSqueak (${{ matrix.type }}-${{ matrix.os }})
      uses: *download_artifact_action
      with:
        name: trufflesqueak-${{ matrix.type }}-${{ matrix.os }}
    - name: Unpack TruffleSqueak standalone
      run: |
        tar -xzf trufflesqueak-*.tar.gz
        echo $(cd trufflesqueak-*-linux*/bin && pwd) >> $GITHUB_PATH
    - *run_system_reporter
    - name: Run 'tinyBenchmarks'
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "1 tinyBenchmarks"
    - name: Run 'Bounce' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('Bounce' ${{ matrix.iterations }} 1500)" 2>&1 | tee Bounce.log
    - name: Run 'CD' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('CD' ${{ matrix.iterations }} 250)" 2>&1 | tee CD.log
    - name: Run 'DeltaBlue' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('DeltaBlue' ${{ matrix.iterations }} 12000)" 2>&1 | tee DeltaBlue.log
    - name: Run 'Havlak' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('Havlak' ${{ matrix.iterations }} 1500)" 2>&1 | tee Havlak.log
    - name: Run 'Json' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('Json' ${{ matrix.iterations }} 100)" 2>&1 | tee Json.log
    - name: Run 'List' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('List' ${{ matrix.iterations }} 1500)" 2>&1 | tee List.log
    - name: Run 'Mandelbrot' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('Mandelbrot' ${{ matrix.iterations }} 500)" 2>&1 | tee Mandelbrot.log
    - name: Run 'NBody' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('NBody' ${{ matrix.iterations }} 250000)" 2>&1 | tee NBody.log
    - name: Run 'Queens' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('Queens' ${{ matrix.iterations }} 1000)" 2>&1 | tee Queens.log
    - name: Run 'Permute' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('Permute' ${{ matrix.iterations }} 1000)" 2>&1 | tee Permute.log
    - name: Run 'Richards' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('Richards' ${{ matrix.iterations }} 100)" 2>&1 | tee Richards.log
    - name: Run 'Sieve' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('Sieve' ${{ matrix.iterations }} 3000)" 2>&1 | tee Sieve.log
    - name: Run 'Storage' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('Storage' ${{ matrix.iterations }} 1000)" 2>&1 | tee Storage.log
    - name: Run 'Towers' benchmark
      run: |
        ${{ env.EXEC }} trufflesqueak ${{ env.COMMON_VM_ARGS }} ${{ matrix.vm-args }} -- --evaluate "AWFYHarness run: #('Towers' ${{ matrix.iterations }} 1500)" 2>&1 | tee Towers.log
    - name: Analyze benchmark results
      run: |
        body="$(python mx.trufflesqueak/analyze_benchmarks.py ${{ matrix.kind }})"
        echo "$body" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ github.event_name }}" == "push" ]]; then
          jq -cn --arg body "$body" '{ body: $body }' > comment.json
          curl --fail-with-body -sSL -X POST --data-binary @comment.json \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments"
        fi
    - name: Upload Graal compiler dumps
      uses: *upload_artifact_action
      with:
        name: graal_dumps-benchmarks-${{ matrix.os }}
        path: graal_dumps/
        if-no-files-found: ignore
        retention-days: 5
      if: ${{ matrix.kind == 'peak' }}
  test-summary:
    name: Generate Test Summary
    needs: [ build-jvm-standalone, build-native-standalone ]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Download GraalVM Compiler Dumps (if any)
        uses: actions/download-artifact@v8
        with:
          pattern: graal_dumps-*
          path: all-times
        continue-on-error: true

      - name: Build table and post to commit
        env:
          # Pass JVM timings
          JVM_SQUEAK_U22: ${{ needs.build-jvm-standalone.outputs.squeak_ubuntu_22_04 }}
          JVM_SQUEAK_ARM: ${{ needs.build-jvm-standalone.outputs.squeak_ubuntu_22_04_arm }}
          JVM_SQUEAK_MAC: ${{ needs.build-jvm-standalone.outputs.squeak_macos_14 }}
          JVM_SQUEAK_WIN: ${{ needs.build-jvm-standalone.outputs.squeak_windows_2022 }}
          JVM_C73_U22: ${{ needs.build-jvm-standalone.outputs.cuis73_ubuntu_22_04 }}
          JVM_C73_ARM: ${{ needs.build-jvm-standalone.outputs.cuis73_ubuntu_22_04_arm }}
          JVM_C73_MAC: ${{ needs.build-jvm-standalone.outputs.cuis73_macos_14 }}
          JVM_C73_WIN: ${{ needs.build-jvm-standalone.outputs.cuis73_windows_2022 }}
          JVM_C75_U22: ${{ needs.build-jvm-standalone.outputs.cuis75_ubuntu_22_04 }}
          JVM_C75_ARM: ${{ needs.build-jvm-standalone.outputs.cuis75_ubuntu_22_04_arm }}
          JVM_C75_MAC: ${{ needs.build-jvm-standalone.outputs.cuis75_macos_14 }}
          JVM_C75_WIN: ${{ needs.build-jvm-standalone.outputs.cuis75_windows_2022 }}

          # Pass Native timings
          NAT_SQUEAK_U22: ${{ needs.build-native-standalone.outputs.squeak_ubuntu_22_04 }}
          NAT_SQUEAK_ARM: ${{ needs.build-native-standalone.outputs.squeak_ubuntu_22_04_arm }}
          NAT_SQUEAK_MAC: ${{ needs.build-native-standalone.outputs.squeak_macos_14 }}
          NAT_SQUEAK_WIN: ${{ needs.build-native-standalone.outputs.squeak_windows_2022 }}
          NAT_C73_U22: ${{ needs.build-native-standalone.outputs.cuis73_ubuntu_22_04 }}
          NAT_C73_ARM: ${{ needs.build-native-standalone.outputs.cuis73_ubuntu_22_04_arm }}
          NAT_C73_MAC: ${{ needs.build-native-standalone.outputs.cuis73_macos_14 }}
          NAT_C73_WIN: ${{ needs.build-native-standalone.outputs.cuis73_windows_2022 }}
          NAT_C75_U22: ${{ needs.build-native-standalone.outputs.cuis75_ubuntu_22_04 }}
          NAT_C75_ARM: ${{ needs.build-native-standalone.outputs.cuis75_ubuntu_22_04_arm }}
          NAT_C75_MAC: ${{ needs.build-native-standalone.outputs.cuis75_macos_14 }}
          NAT_C75_WIN: ${{ needs.build-native-standalone.outputs.cuis75_windows_2022 }}
        shell: bash
        run: |
          echo "### ⏱️ Test Durations Summary" > summary.md
          FOOTNOTE_REQUIRED=false
          
          has_warnings() {
            local type=$1
            local os=$2
            if [ -d "all-times/graal_dumps-${type}-${os}" ] && [ "$(ls -A all-times/graal_dumps-${type}-${os} 2>/dev/null)" ]; then
              echo "true"
            else
              echo "false"
            fi
          }
          
          # Function to neatly format empty variables as an em-dash
          val() {
            if [ -z "$1" ]; then echo "—"; else echo "$1"; fi
          }
          
          for type in jvm native; do
            if [ "$type" == "jvm" ]; then
              echo "#### JVM Standalone" >> summary.md
              prefix="JVM"
            else
              echo "#### Native Standalone (AOT)" >> summary.md
              prefix="NAT"
            fi
          
            h_u22="Ubuntu 22.04"
            h_arm="Ubuntu ARM"
            h_mac="macOS 14"
            h_win="Windows 2022"
          
            if [ "$(has_warnings "$type" "ubuntu-22.04")" == "true" ]; then h_u22="${h_u22} †"; FOOTNOTE_REQUIRED=true; fi
            if [ "$(has_warnings "$type" "ubuntu-22.04-arm")" == "true" ]; then h_arm="${h_arm} †"; FOOTNOTE_REQUIRED=true; fi
            if [ "$(has_warnings "$type" "macos-14")" == "true" ]; then h_mac="${h_mac} †"; FOOTNOTE_REQUIRED=true; fi
            if [ "$(has_warnings "$type" "windows-2022")" == "true" ]; then h_win="${h_win} †"; FOOTNOTE_REQUIRED=true; fi
          
            echo "| Test Suite | ${h_u22} | ${h_arm} | ${h_mac} | ${h_win} |" >> summary.md
            echo "| :--- | :---: | :---: | :---: | :---: |" >> summary.md
          
            for test in SQUEAK C73 C75; do
              case $test in
                SQUEAK) name="**Squeak / Smalltalk**" ;;
                C73) name="**Cuis 7.3**" ;;
                C75) name="**Cuis 7.5**" ;;
              esac
          
              # Dynamically fetch the env variable using Bash indirect expansion
              v_u22="${prefix}_${test}_U22"
              v_arm="${prefix}_${test}_ARM"
              v_mac="${prefix}_${test}_MAC"
              v_win="${prefix}_${test}_WIN"
          
              echo "| ${name} | $(val "${!v_u22}") | $(val "${!v_arm}") | $(val "${!v_mac}") | $(val "${!v_win}") |" >> summary.md
            done
            echo "" >> summary.md
          done
          
          if [ "$FOOTNOTE_REQUIRED" = true ]; then
            echo "*† Indicates that GraalVM compilation warnings or failure diagnostics were generated on this platform environment during the run.*" >> summary.md
          fi
          
          # Echo to step summary for logging visibility
          cat summary.md >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "Posting summary directly to commit ${{ github.sha }}..."
            summary_body="$(cat summary.md)"
            jq -cn --arg body "$summary_body" '{ body: $body }' > comment.json
          
            curl --fail-with-body -sSL -X POST --data-binary @comment.json \
              -H "Content-Type: application/json" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments"
          fi
          

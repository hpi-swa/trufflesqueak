name: Generate Master Test Summary

on:
  # Trigger 1: Automatically after the main CI finishes
  workflow_run:
    workflows: ["Test TruffleSqueak"]
    types:
      - completed
  # Trigger 2: Manually via the GitHub UI or CLI
  workflow_dispatch:
    inputs:
      run_id:
        description: 'The Run ID of a completed Test TruffleSqueak workflow'
        required: true
        type: string

permissions:
  contents: write # Needed to post commit comments
  pull-requests: write # Needed to post PR comments

jobs:
  post-summary:
    name: Parse Logs and Comment
    runs-on: ubuntu-22.04
    # Run if triggered manually, OR if triggered automatically (regardless of pass/fail)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Determine Target Run ID and Commit SHA
        id: target_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "RUN_ID=${{ inputs.run_id }}" >> $GITHUB_ENV
            # Fetch the commit SHA from the provided run ID
            SHA=$(gh run view ${{ inputs.run_id }} --repo ${{ github.repository }} --json headSha -q .headSha)
            echo "COMMIT_SHA=$SHA" >> $GITHUB_ENV
          else
            echo "RUN_ID=${{ github.event.workflow_run.id }}" >> $GITHUB_ENV
            echo "COMMIT_SHA=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          fi

      - name: Download GraalVM Compiler Dumps (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ env.RUN_ID }} --repo ${{ github.repository }} --pattern 'graal_dumps-*' --dir all-times || true

      - name: Extract Logs, Build Table, and Post
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh run view ${{ env.RUN_ID }} --repo ${{ github.repository }} --log | grep "::TEST_TIME_METRIC::" | grep -v 'echo ' | grep -v 'Write-Host ' > extracted_times.txt || true
  
          echo "### ⏱️ Test Durations Summary" > summary.md
          FOOTNOTE_REQUIRED=false
          
          get_time() {
            local type=$1
            local os=$2
            local test_type=$3
            val=$(grep "::TEST_TIME_METRIC::${type}::${os}::${test_type}::" extracted_times.txt | head -n 1 | awk -F'::' '{print $6}')
            echo "${val:-—}"
          }
          
          has_warnings() {
            local type=$1
            local os=$2
            if [ -d "all-times/graal_dumps-${type}-${os}" ] && [ "$(ls -A all-times/graal_dumps-${type}-${os} 2>/dev/null)" ]; then
              echo "true"
            else
              echo "false"
            fi
          }
          
          for type in jvm native; do
            if [ "$type" == "jvm" ]; then
              echo "#### JVM Standalone" >> summary.md
            else
              echo "#### Native Standalone (AOT)" >> summary.md
            fi
          
            h_u22="Ubuntu 22.04"
            h_arm="Ubuntu ARM"
            h_mac="macOS 14"
            h_win="Windows 2022"
          
            if [ "$(has_warnings "$type" "ubuntu-22.04")" == "true" ]; then h_u22="${h_u22} †"; FOOTNOTE_REQUIRED=true; fi
            if [ "$(has_warnings "$type" "ubuntu-22.04-arm")" == "true" ]; then h_arm="${h_arm} †"; FOOTNOTE_REQUIRED=true; fi
            if [ "$(has_warnings "$type" "macos-14")" == "true" ]; then h_mac="${h_mac} †"; FOOTNOTE_REQUIRED=true; fi
            if [ "$(has_warnings "$type" "windows-2022")" == "true" ]; then h_win="${h_win} †"; FOOTNOTE_REQUIRED=true; fi
          
            echo "| Test Suite | ${h_u22} | ${h_arm} | ${h_mac} | ${h_win} |" >> summary.md
            echo "| :--- | :---: | :---: | :---: | :---: |" >> summary.md
          
            for test in SQUEAK CUIS_73 CUIS_75; do
              case $test in
                SQUEAK) name="**Squeak / Smalltalk**" ;;
                CUIS_73) name="**Cuis 7.3**" ;;
                CUIS_75) name="**Cuis 7.5**" ;;
              esac
          
              u22=$(get_time "$type" "ubuntu-22.04" "$test")
              u22arm=$(get_time "$type" "ubuntu-22.04-arm" "$test")
              mac=$(get_time "$type" "macos-14" "$test")
              win=$(get_time "$type" "windows-2022" "$test")
          
              echo "| ${name} | $u22 | $u22arm | $mac | $win |" >> summary.md
            done
            echo "" >> summary.md
          done
          
          if [ "$FOOTNOTE_REQUIRED" = true ]; then
            echo "*† Indicates that GraalVM compilation warnings or failure diagnostics were generated on this platform environment during the run.*" >> summary.md
          fi
          
          # Echo to step summary for logging visibility
          cat summary.md >> $GITHUB_STEP_SUMMARY
          
          echo "Posting summary directly to commit ${{ env.COMMIT_SHA }}..."
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/commits/${{ env.COMMIT_SHA }}/comments \
            -f body="$(cat summary.md)"

          # Check for associated Pull Request and post there as well
          # ONLY if the parent run was NOT a standard 'push' (to avoid duplicates)
          PARENT_EVENT="${{ github.event.workflow_run.event }}"
          
          if [ "$PARENT_EVENT" != "push" ]; then
            PR_NUMBER=$(gh api repos/${{ github.repository }}/commits/${{ env.COMMIT_SHA }}/pulls -q '.[0].number' 2>/dev/null || echo "")
          
            if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
              echo "Posting summary to PR #${PR_NUMBER}..."
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
                -f body="$(cat summary.md)"
            fi
          else
            echo "Parent run was a 'push' event. Skipping PR comment to prevent duplicates."
          fi

